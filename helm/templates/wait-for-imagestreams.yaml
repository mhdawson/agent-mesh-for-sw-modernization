apiVersion: v1
kind: ServiceAccount
metadata:
  name: imagestream-waiter
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: imagestream-waiter
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
  - apiGroups: ["image.openshift.io"]
    resources: ["imagestreams"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: imagestream-waiter
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
subjects:
  - kind: ServiceAccount
    name: imagestream-waiter
    namespace: {{ .Values.namespace }}
roleRef:
  kind: Role
  name: imagestream-waiter
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-imagestreams
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: imagestream-waiter
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          command:
            - sh
            - -c
            - |
              wait_for_imagestream() {
                local name=$1
                while true; do
                  status=$(oc get imagestream "$name" -n {{ .Values.namespace }} \
                    -o jsonpath='{.status.tags[0].conditions[?(@.type=="ImportSuccess")].status}' 2>/dev/null)
                  if [ "$status" = "False" ]; then
                    msg=$(oc get imagestream "$name" -n {{ .Values.namespace }} \
                      -o jsonpath='{.status.tags[0].conditions[?(@.type=="ImportSuccess")].message}' 2>/dev/null)
                    echo "ERROR: ImageStream $name import failed: $msg"
                    exit 1
                  fi
                  sha=$(oc get imagestream "$name" -n {{ .Values.namespace }} \
                    -o jsonpath='{.status.tags[0].items[0].image}' 2>/dev/null)
                  if echo "$sha" | grep -q sha256; then
                    echo "$name ready ($sha)"
                    return 0
                  fi
                  echo "Waiting for $name..."
                  sleep 5
                done
              }
              wait_for_imagestream agent-mesh-data-generation
              wait_for_imagestream agent-mesh-data-indexing
              echo "All ImageStreams imported successfully"
