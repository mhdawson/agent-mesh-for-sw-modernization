apiVersion: batch/v1
kind: Job
metadata:
  name: register-pipelines
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-failed
spec:
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        pipelines.kubeflow.org/v2_component: "true"
    spec:
      restartPolicy: Never
      containers:
        - name: register
          image: registry.access.redhat.com/ubi9/python-311
          command:
            - sh
            - -c
            - |
              pip3 install kfp --quiet --target /tmp/kfp-packages
              echo "Waiting for KFP server..."
              until python3 -c "import urllib.request,ssl; ctx=ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT); ctx.check_hostname=False; ctx.verify_mode=ssl.CERT_NONE; urllib.request.urlopen('https://ds-pipeline-dspa.{{ .Values.namespace }}.svc.cluster.local:8888/apis/v2beta1/healthz',timeout=5,context=ctx)" 2>/dev/null; do
                echo "KFP server not ready, retrying in 10s..."
                sleep 10
              done
              echo "KFP server ready"
              PYTHONPATH=/tmp/kfp-packages HOME=/tmp python3 -c "
              from kfp.client import Client

              KFP_ENDPOINT = 'https://ds-pipeline-dspa.{{ .Values.namespace }}.svc.cluster.local:8888'
              c = Client(host=KFP_ENDPOINT, verify_ssl=False)

              def list_all_pipelines():
                  results, token = [], None
                  while True:
                      resp = c.list_pipelines(page_size=100, page_token=token)
                      results.extend(resp.pipelines or [])
                      token = resp.next_page_token
                      if not token:
                          break
                  return results

              def register_pipeline(name, path):
                  existing = next((p for p in list_all_pipelines() if p.display_name == name), None)
                  if existing:
                      try:
                          c.upload_pipeline_version(
                              pipeline_package_path=path,
                              pipeline_id=existing.pipeline_id,
                              pipeline_version_name='{{ .Values.version }}',
                          )
                          print(f'Uploaded new version of {name}: {{ .Values.version }}')
                      except Exception as e:
                          print(f'Version already exists for {name}, skipping: {e}')
                  else:
                      c.upload_pipeline(pipeline_package_path=path, pipeline_name=name)
                      print(f'Registered {name}')

              register_pipeline('code-understanding-pipeline', '/pipelines/code_understanding_pipeline.yaml')
              register_pipeline('code-analysis-pipeline', '/pipelines/code_analysis_pipeline.yaml')
              "
          volumeMounts:
            - name: understanding-pipeline-def
              mountPath: /pipelines/code_understanding_pipeline.yaml
              subPath: code_understanding_pipeline.yaml
            - name: analysis-pipeline-def
              mountPath: /pipelines/code_analysis_pipeline.yaml
              subPath: code_analysis_pipeline.yaml
      volumes:
        - name: understanding-pipeline-def
          configMap:
            name: code-understanding-pipeline-def
        - name: analysis-pipeline-def
          configMap:
            name: code-analysis-pipeline-def
