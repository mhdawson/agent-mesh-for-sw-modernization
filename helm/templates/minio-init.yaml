apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  activeDeadlineSeconds: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:latest
          command:
            - sh
            - -c
            - |
              export HOME=/tmp
              until mc alias set local http://minio.{{ .Values.namespace }}:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" > /dev/null 2>&1; do
                echo "Waiting for Minio..."
                sleep 5
              done
              mc mb --ignore-existing local/{{ .Values.minio.bucket }}
              echo "Bucket {{ .Values.minio.bucket }} ready"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: password
